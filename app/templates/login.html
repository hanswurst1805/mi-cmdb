<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Mini-CMDB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #212529; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { width: 100%; max-width: 380px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <h2 class="text-white fw-bold"><i class="bi bi-server"></i> Mini-CMDB</h2>
      <p class="text-secondary">Bitte anmelden</p>
    </div>
    <div class="card shadow border-0">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label fw-semibold">Benutzername</label>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Passwort</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Anmelden</button>
        </form>
      </div>
    </div>
  </div>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
