<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Mini-CMDB{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar { min-height: 100vh; background: #212529; }
    .sidebar .nav-link { color: #adb5bd; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: #343a40; border-radius: 6px; }
    .sidebar .brand { color: #fff; font-size: 1.25rem; font-weight: 700; padding: 1rem; }
    .badge-active { background: #198754; }
    .badge-inactive { background: #6c757d; }
    .badge-decommissioned { background: #dc3545; }
  </style>
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 sidebar py-3">
      <div class="brand"><i class="bi bi-server me-2"></i>Mini-CMDB</div>
      <ul class="nav flex-column px-2 mt-3">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-speedometer2 me-2"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/machines' in request.url.path %}active{% endif %}" href="/machines">
            <i class="bi bi-pc-display me-2"></i>Maschinen
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/networks' in request.url.path %}active{% endif %}" href="/networks">
            <i class="bi bi-diagram-3 me-2"></i>Netzwerke
          </a>
        </li>
        <li class="nav-item mt-3">
          <a class="nav-link {% if '/chat' in request.url.path %}active{% endif %}" href="/chat">
            <i class="bi bi-chat-dots me-2"></i>KI-Assistent
          </a>
        </li>
        <li class="nav-item mt-3">
          <a class="nav-link" href="/docs" target="_blank">
            <i class="bi bi-code-slash me-2"></i>API Docs
          </a>
        </li>
        <li class="nav-item mt-auto pt-4">
          <a class="nav-link text-danger" href="/logout">
            <i class="bi bi-box-arrow-left me-2"></i>Abmelden
          </a>
        </li>
      </ul>
    </nav>
    <main class="col-md-10 py-4 px-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
